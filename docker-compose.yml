# ============================================================================
# A股数据仓库 — Docker Compose
# ============================================================================
# Usage:
#   docker compose up -d                    # Start scheduler
#   docker compose exec ingestion daily-update   # Manual trigger
#   docker compose exec ingestion status         # Check data
# ============================================================================

services:
  ingestion:
    build: .
    image: ashare-data-warehouse:latest
    container_name: ashare-data-warehouse
    restart: unless-stopped
    network_mode: host

    # Mount data as Docker volume for persistence (avoids Windows bind-mount issues)
    volumes:
      - ingestion_data:/app/data/ingestion

    # Environment variables override config.yaml values
    environment:
      - INGESTION_DB_PATH=/app/data/ingestion/stock_research.duckdb
      - INGESTION_DATA_DIR=/app/data/ingestion
      - INGESTION_CONFIG=/app/config.yaml
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - TZ=Asia/Shanghai

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    # Healthcheck — TCP check on MCP port (avoids DuckDB cross-process lock conflict)
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1',8001)); s.close(); print('OK')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ashare-data-warehouse-web:latest
    container_name: ashare-data-warehouse-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ingestion_data:/app/data/ingestion
    environment:
      - INGESTION_DB_PATH=/app/data/ingestion/stock_research.duckdb
      - INGESTION_DATA_DIR=/app/data/ingestion
      - TZ=Asia/Shanghai
    depends_on:
      ingestion:
        condition: service_healthy

volumes:
  ingestion_data:
