{% extends "base.html" %}
{% block title %}调度配置 — A股数据仓库{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="m-0">🕐 调度配置</h4>
    <button class="btn btn-sm btn-outline-secondary" onclick="refreshSchedule()">刷新</button>
</div>

<div id="schedule-panel" hx-get="/api/schedule" hx-trigger="load" hx-swap="innerHTML">
    <div class="text-center py-5">
        <div class="spinner-border text-primary"></div>
    </div>
</div>

<script>
function refreshSchedule() {
    htmx.trigger('#schedule-panel', 'load');
}

document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.target.id !== 'schedule-panel') return;
    const data = evt.detail.serverResponse;
    if (!data) return;

    // Parse JSON response from htmx
    try {
        const json = JSON.parse(data);
        renderSchedule(json);
        evt.detail.shouldSwap = false;
    } catch(e) {}
});

// Alternative: fetch via JS
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(loadSchedule, 100);
});

function loadSchedule() {
    fetch('/api/schedule')
        .then(r => r.json())
        .then(data => renderSchedule(data));
}

function renderSchedule(data) {
    const panel = document.getElementById('schedule-panel');

    let html = '';

    // Schedule times
    html += `<div class="card mb-3"><div class="card-header">时间配置</div>
        <div class="card-body p-0">
            <table class="table table-sm mb-0">
                <thead><tr><th>名称</th><th>时间</th><th>类型</th></tr></thead><tbody>`;

    let times = [];
    for (const [name, time] of Object.entries(data.schedule || {})) {
        times.push({name, time});
    }
    times.sort((a, b) => a.time.localeCompare(b.time) || a.name.localeCompare(b.name));

    times.forEach(({name, time}) => {
        let type = '单表';
        for (const [g, members] of Object.entries(data.groups || {})) {
            if (g === name) { type = '组'; break; }
        }
        html += `<tr><td><code>${name}</code></td><td><span class="badge bg-primary">${time}</span></td><td>${type}</td></tr>`;
    });

    html += `</tbody></table></div></div>`;

    // Groups
    html += `<div class="card mb-3"><div class="card-header">调度组</div>
        <div class="card-body p-0">
            <table class="table table-sm mb-0">
                <thead><tr><th>组名</th><th>包含表</th></tr></thead><tbody>`;

    for (const [groupName, members] of Object.entries(data.groups || {})) {
        html += `<tr><td><code>${groupName}</code></td><td class="small">`;
        const links = members.map(m => `<code>${m}</code>`).join(', ');
        html += links;
        html += `</td></tr>`;
    }

    html += `</tbody></table></div></div>`;

    // Ungrouped tables
    if (data.ungrouped && data.ungrouped.length > 0) {
        html += `<div class="card mb-3"><div class="card-header">未归组表</div>
            <div class="card-body">
                <p class="small text-secondary mb-0">以下表没有在任何调度组中：</p>
                ${data.ungrouped.map(t => `<code>${t}</code>`).join(', ')}
            </div></div>`;
    }

    // Timeline visualization
    html += `<div class="card"><div class="card-header">每日时间线</div><div class="card-body">`;
    const hours = [];
    for (let h = 0; h < 24; h++) {
        hours.push(`${String(h).padStart(2, '0')}:00`);
    }

    // Find all schedule times
    const scheduleEntries = [];
    for (const [name, timeStr] of Object.entries(data.schedule || {})) {
        const match = timeStr.match(/(\d{2}):(\d{2})/);
        if (match) {
            const hour = parseInt(match[1]);
            const minute = parseInt(match[2]);
            const totalMin = hour * 60 + minute;
            scheduleEntries.push({name, timeStr, hour, minute, totalMin});
        }
    }
    scheduleEntries.sort((a, b) => a.totalMin - b.totalMin);

    // Simple timeline as a table
    html += `<div class="table-responsive"><table class="table table-sm mb-0">`;
    let lastHour = -1;
    scheduleEntries.forEach(entry => {
        const hourLabel = `${String(entry.hour).padStart(2, '0')}:00`;
        if (entry.hour !== lastHour) {
            if (lastHour >= 0) html += `</tbody>`;
            html += `<thead><tr><th colspan="2" class="small text-secondary">${hourLabel}</th></tr></thead><tbody>`;
            lastHour = entry.hour;
        }
        const indent = '  '.repeat(entry.minute / 5);
        html += `<tr><td style="padding-left:${entry.minute}px"><span class="badge bg-info">${entry.timeStr}</span></td><td><code>${entry.name}</code></td></tr>`;
    });
    html += `</tbody></table></div>`;

    html += `<p class="text-secondary small mt-2">配置文件：<code>config.yaml</code> → <code>schedule</code> 节</p>`;
    html += `</div></div>`;

    panel.innerHTML = html;
}
</script>
{% endblock %}
